<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Thumbnail Studio — Creator OS</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:#EDEBE6; font-family:'Plus Jakarta Sans',sans-serif; -webkit-font-smoothing:antialiased; }
  .page { height:100vh; height:100dvh; display:flex; flex-direction:column; }
  .topbar { padding:env(safe-area-inset-top,52px) 18px 0; display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-shrink:0; }
  .back-btn { width:38px; height:38px; background:#fff; border:none; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; box-shadow:0 2px 10px rgba(44,26,6,0.08); flex-shrink:0; }
  .page-title { font-family:'Fredoka',sans-serif; font-size:20px; font-weight:700; color:#2C1A06; }
  .center { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:0 28px; text-align:center; }
  .big-emoji { font-size:64px; }
  .coming-title { font-family:'Fredoka',sans-serif; font-size:28px; font-weight:700; color:#2C1A06; }
  .coming-sub { font-size:14px; color:#9B9489; line-height:1.6; }
  .coming-badge { background:#D4892A; color:#fff; font-family:'Fredoka',sans-serif; font-size:13px; font-weight:600; padding:8px 20px; border-radius:999px; }
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">‹</button>
    <div class="page-title">Thumbnail Studio</div>
  </div>
  <div class="center">
    <div class="big-emoji">🖼</div>
    <div class="coming-title">Coming soon</div>
    <div class="coming-sub">We're building Thumbnail Studio right now.<br>It's going to be 🔥</div>
    <div class="coming-badge">In development</div>
  </div>
</div>
</body>
</html>
