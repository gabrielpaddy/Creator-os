<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Creator OS</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    height:100%; height:100dvh;
    overflow:hidden; background:#EDEBE6;
    font-family:'Plus Jakarta Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .page {
    height:100vh; height:100dvh;
    background:#EDEBE6;
    display:flex; flex-direction:column;
    padding: env(safe-area-inset-top,52px) 16px 0;
    overflow:hidden;
  }

  .top {
    flex-shrink:0;
    display:flex; align-items:center;
    justify-content:space-between; margin-bottom:24px;
  }
  .logo { font-family:'Fredoka', sans-serif; font-size:18px; font-weight:600; color:#2C1A06; }
  .logo .O { color:#C1440E; }
  .logo .S { color:#E8A838; }
  .step-pills { display:flex; gap:5px; }
  .step-pill { width:28px; height:5px; border-radius:999px; background:#D4C9B8; }
  .step-pill.on { background:#C1440E; }

  /* HEADER */
  .header-card {
    background: linear-gradient(145deg, #C1440E 0%, #A83510 100%);
    border-radius:24px; padding:20px 20px 18px;
    margin-bottom:16px; flex-shrink:0;
    position:relative; overflow:hidden;
  }
  .header-card::before {
    content:''; position:absolute;
    width:150px; height:150px;
    background:rgba(255,255,255,0.08);
    border-radius:50%; bottom:-40px; left:-30px;
  }
  .h-eyebrow {
    font-family:'Fredoka', sans-serif;
    font-size:11px; font-weight:500;
    color:rgba(255,220,180,0.6); letter-spacing:0.1em;
    text-transform:uppercase; margin-bottom:6px;
  }
  .h-title {
    font-family:'Fredoka', sans-serif;
    font-size:26px; font-weight:700;
    color:#fff; line-height:1.2;
    position:relative; z-index:1;
  }
  .h-sub {
    font-size:13px; color:rgba(255,220,180,0.6);
    margin-top:4px; font-weight:500;
    position:relative; z-index:1;
  }

  /* PLATFORM CARDS — bigger, full width */
  .platforms { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; min-height:0; }
  .platforms::-webkit-scrollbar { display:none; }

  .p-card {
    background:#fff;
    border:2.5px solid transparent;
    border-radius:20px; padding:16px 18px;
    margin-bottom:10px; cursor:pointer;
    display:flex; align-items:center; gap:13px;
    transition:all 0.18s cubic-bezier(0.16,1,0.3,1);
    position:relative;
    -webkit-user-select:none;
  }
  .p-card.selected {
    border-color:#C1440E;
    background:#FFF5F2;
    transform:scale(0.98);
  }
  .p-icon {
    width:44px; height:44px; border-radius:13px;
    display:flex; align-items:center; justify-content:center;
    font-size:24px; flex-shrink:0;
  }
  .p-info { flex:1; }
  .p-name {
    font-family:'Fredoka', sans-serif;
    font-size:17px; font-weight:700; color:#2C1A06;
    margin-bottom:2px;
  }
  .p-desc { font-size:12px; color:#9B9489; font-weight:500; }
  .p-check {
    width:24px; height:24px; border-radius:50%;
    background:#EDE9E0; border:2px solid #D4C9B8;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:all 0.18s;
  }
  .p-card.selected .p-check {
    background:#C1440E; border-color:#C1440E;
  }
  .p-check-inner {
    width:8px; height:8px; border-radius:50%;
    background:#fff; opacity:0; transition:opacity 0.15s;
  }
  .p-card.selected .p-check-inner { opacity:1; }

  /* BUTTON */
  .btn-card {
    background:#2C1A06; border-radius:22px 22px 0 0;
    flex-shrink:0; overflow:hidden;
  }
  .btn-main {
    width:100%; background:none; border:none;
    padding:18px 16px; font-size:17px; font-weight:700;
    font-family:'Fredoka', sans-serif;
    color:#F2C94C; cursor:pointer;
    transition:opacity 0.15s;
    opacity:0.35; pointer-events:none;
  }
  .btn-main.ready { opacity:1; pointer-events:auto; }
  .btn-main.ready:active { opacity:0.7; }
</style>
</head>
<body>
<div class="page">

  <div class="top">
    <button onclick="history.back()" style="background:#fff;border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;box-shadow:0 2px 10px rgba(44,26,6,0.1);">
      <span style="font-size:20px;color:#2C1A06;line-height:1;font-weight:700;margin-top:-1px;">‹</span>
    </button>
    <div class="logo">creator <span class="O">O</span><span class="S">S</span></div>
    <div class="step-pills">
      <div class="step-pill on"></div>
      <div class="step-pill on"></div>
      <div class="step-pill on"></div>
      <div class="step-pill"></div>
    </div>
  </div>

  <div class="header-card">
    <div class="h-eyebrow">Step 3 of 4</div>
    <div class="h-title">Where do you post?</div>
    <div class="h-sub">Pick all that apply — we'll tailor everything.</div>
  </div>

  <div class="platforms" id="platforms"></div>

  <div class="btn-card">
    <button class="btn-main" id="btn" onclick="goNext()">Continue →</button>
  </div>

</div>
<script>
  // If already set up, go to dashboard
  if (localStorage.getItem('cos_platforms')) {
    window.location.href = 'dashboard.html';
  }

  var PLATFORMS = [
    { id:'tiktok',    emoji:'🎵', name:'TikTok',            desc:'Short videos, trending sounds',  bg:'#010101' },
    { id:'youtube',   emoji:'▶️', name:'YouTube Shorts',    desc:'Vertical shorts, long form',     bg:'#FF0000' },
    { id:'instagram', emoji:'📸', name:'Instagram Reels',   desc:'Stories, reels, explore page',   bg:'#E1306C' },
    { id:'x',         emoji:'𝕏',  name:'X / Twitter',       desc:'Threads, clips, hot takes',      bg:'#000000' },
    { id:'facebook',  emoji:'👥', name:'Facebook Reels',    desc:'Reels, groups, pages',           bg:'#1877F2' },
  ];

  var selected = [];
  var wrap = document.getElementById('platforms');

  PLATFORMS.forEach(function(p) {
    var card = document.createElement('div');
    card.className = 'p-card';
    card.id = 'pc_' + p.id;
    card.innerHTML =
      '<div class="p-icon" style="background:' + p.bg + '20">' + p.emoji + '</div>' +
      '<div class="p-info">' +
        '<div class="p-name">' + p.name + '</div>' +
        '<div class="p-desc">' + p.desc + '</div>' +
      '</div>' +
      '<div class="p-check"><div class="p-check-inner"></div></div>';
    card.onclick = function() { toggle(p.id); };
    wrap.appendChild(card);
  });

  function toggle(id) {
    var idx = selected.indexOf(id);
    if (idx >= 0) selected.splice(idx, 1);
    else selected.push(id);
    render();
    if (navigator.vibrate) navigator.vibrate(8);
  }

  function render() {
    PLATFORMS.forEach(function(p) {
      var card = document.getElementById('pc_' + p.id);
      card.classList.toggle('selected', selected.indexOf(p.id) >= 0);
    });
    var btn = document.getElementById('btn');
    btn.classList.toggle('ready', selected.length > 0);
  }

  function goNext() {
    if (!selected.length) return;
    localStorage.setItem('cos_platforms', JSON.stringify(selected));
    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
