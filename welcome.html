<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Creator OS</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    height:100%; height:100dvh;
    overflow:hidden; background:#fff;
    font-family:'Plus Jakarta Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  /* ── WELCOME ── */
  #sw {
    position:fixed; inset:0; background:#fff;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    z-index:100;
  }
  #sw.out { animation:fadeOut 0.5s ease forwards; }
  @keyframes fadeOut { to { opacity:0; pointer-events:none; } }

  /* hi! + hand row — starts centered big, then moves up */
  #hi-row {
    display:flex; align-items:center; justify-content:center;
    gap:10px;
    /* start position */
    transform:translateY(0) scale(1);
    transition:transform 0.55s cubic-bezier(0.16,1,0.3,1),
               font-size 0.55s cubic-bezier(0.16,1,0.3,1);
    margin-bottom:0;
  }
  #hi-row.moved {
    transform:translateY(-52px) scale(0.82);
  }

  .hi-txt {
    font-family:'Fredoka', sans-serif;
    font-size:52px; font-weight:700;
    color:#2C1A06; line-height:1;
    opacity:0; transform:scale(0.7);
    animation:popBig 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards;
  }
  .hand-em {
    font-size:52px; line-height:1;
    opacity:0; transform:scale(0.7) translateY(6px);
    animation:popBig 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.38s forwards;
    display:inline-block;
    transform-origin:70% 80%;
  }
  .hand-em.wave {
    animation:popBig 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.38s forwards,
              waveIt 0.7s ease 1s 2;
  }
  @keyframes popBig {
    to { opacity:1; transform:scale(1) translateY(0); }
  }
  @keyframes waveIt {
    0%,100% { transform:rotate(0deg); }
    25%     { transform:rotate(22deg) translateY(-3px); }
    75%     { transform:rotate(-8deg); }
  }

  /* welcome to + creator OS — hidden initially */
  #wt-block {
    display:flex; flex-direction:column;
    align-items:center; gap:8px;
    opacity:0; transform:translateY(10px);
    transition:opacity 0.45s ease, transform 0.45s ease;
    margin-top:12px;
  }
  #wt-block.show { opacity:1; transform:translateY(0); }

  .wt-line {
    font-family:'Fredoka', sans-serif;
    font-size:17px; font-weight:500;
    color:#9B9489; letter-spacing:0.04em;
  }

  .logo-line {
    font-family:'Fredoka', sans-serif;
    font-size:40px; font-weight:700;
    color:#2C1A06; letter-spacing:0.3px;
    display:flex; align-items:center; justify-content:center;
  }
  .logo-line .l {
    display:inline-block;
    opacity:0; transform:translateY(10px) scale(0.8);
  }
  .logo-line .l.pop {
    animation:lPop 0.38s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes lPop { to { opacity:1; transform:translateY(0) scale(1); } }
  .l-O { color:#C1440E; }
  .l-S { color:#E8A838; }

  /* ── NAME SCREEN ── */
  #sn {
    position:fixed; inset:0; background:#fff;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:0 28px 80px;
    opacity:0; pointer-events:none;
    transition:opacity 0.45s ease;
  }
  #sn.visible { opacity:1; pointer-events:auto; }

  .nq {
    font-family:'Fredoka', sans-serif;
    font-size:28px; font-weight:700;
    color:#2C1A06; text-align:center;
    line-height:1.25; margin-bottom:40px;
  }

  /* Modern floating input */
  .field-wrap {
    width:100%; max-width:320px;
    position:relative; margin-bottom:32px;
  }
  .field-wrap input {
    width:100%;
    background:#F7F5F2;
    border:2px solid #EDE9E0;
    border-radius:16px;
    padding:20px 20px 8px;
    font-size:17px; font-weight:600;
    font-family:'Plus Jakarta Sans', sans-serif;
    color:#2C1A06; outline:none;
    transition:border-color 0.2s, background 0.2s;
    caret-color:#C1440E;
    -webkit-appearance:none;
  }
  .field-wrap input:focus {
    border-color:#C1440E; background:#fff;
  }
  .field-wrap input::placeholder { color:transparent; }
  .field-wrap label {
    position:absolute; left:20px; top:50%;
    transform:translateY(-50%);
    font-family:'Fredoka', sans-serif;
    font-size:17px; font-weight:500;
    color:#C8C2B8; pointer-events:none;
    transition:all 0.2s cubic-bezier(0.16,1,0.3,1);
  }
  .field-wrap input:focus ~ label,
  .field-wrap input:not(:placeholder-shown) ~ label {
    top:10px; transform:translateY(0) scale(0.72);
    color:#C1440E; font-weight:600;
    transform-origin:left center;
  }

  .n-btn {
    width:100%; max-width:320px;
    background:#2C1A06; color:#F2C94C;
    border:none; border-radius:16px;
    padding:17px; font-size:17px; font-weight:700;
    font-family:'Fredoka', sans-serif;
    cursor:pointer;
    opacity:0; transform:translateY(8px);
    transition:opacity 0.25s, transform 0.25s;
    pointer-events:none; letter-spacing:0.2px;
  }
  .n-btn.show { opacity:1; transform:translateY(0); pointer-events:auto; }
  .n-btn:active { opacity:0.8; transform:scale(0.98); }

  .n-skip {
    margin-top:16px;
    background:none; border:none;
    font-size:15px; color:#C8C2B8;
    font-family:'Fredoka', sans-serif;
    font-weight:500;
    cursor:pointer; padding:6px;
  }

  /* ── DASHBOARD placeholder ── */
  #sd {
    position:fixed; inset:0; background:#EDEBE6;
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity 0.5s;
  }
  #sd.visible { opacity:1; pointer-events:auto; }
  .dg {
    font-family:'Fredoka', sans-serif;
    font-size:28px; font-weight:700; color:#2C1A06; text-align:center;
  }
</style>
</head>
<body>

<!-- WELCOME -->
<div id="sw">
  <div id="hi-row">
    <span class="hi-txt">hi!</span>
    <span class="hand-em" id="hand">👋</span>
  </div>
  <div id="wt-block">
    <div class="wt-line">welcome to</div>
    <div class="logo-line" id="ll"></div>
  </div>
</div>

<!-- NAME -->
<div id="sn">
  <div class="nq">What should we<br>call you? 👀</div>
  <div class="field-wrap">
    <input type="text" id="ni" placeholder=" "
      autocomplete="given-name" autocorrect="off"
      autocapitalize="words" spellcheck="false" maxlength="24"
      oninput="onT(this.value)"
      onkeydown="if(event.key==='Enter')doName()">
    <label>your name</label>
  </div>
  <button class="n-btn" id="nb" onclick="doName()">Let's create →</button>
  <button class="n-skip" onclick="doName()">skip</button>
</div>

<!-- DASHBOARD -->
<div id="sd">
  <div class="dg" id="dg">Hey 👋</div>
</div>

<script>
  if (localStorage.getItem('cos_welcomed') === '1') {
    window.location.href = 'dashboard.html';
  } else {
    runWelcome();
  }

  function runWelcome() {
    var hand = document.getElementById('hand');
    hand.classList.add('wave');

    // After hi+hand appear and wave — move them up (1.8s)
    setTimeout(function() {
      document.getElementById('hi-row').classList.add('moved');
    }, 1800);

    // Show "welcome to" + logo block (2.1s)
    setTimeout(function() {
      document.getElementById('wt-block').classList.add('show');
    }, 2100);

    // Pop in creator OS letters (2.4s)
    var letters = [
      {ch:'c',cls:''},{ch:'r',cls:''},{ch:'e',cls:''},{ch:'a',cls:''},
      {ch:'t',cls:''},{ch:'o',cls:''},{ch:'r',cls:''},
      {ch:' ',cls:''}, // space
      {ch:'O',cls:'l-O'},{ch:'S',cls:'l-S'}
    ];

    var ll = document.getElementById('ll');
    ll.innerHTML = letters.map(function(l,i){
      if(l.ch===' ') return '<span style="width:11px;display:inline-block"></span>';
      return '<span class="l '+l.cls+'" id="L'+i+'">'+l.ch+'</span>';
    }).join('');

    var startMs = 2400, idx = 0;
    letters.forEach(function(l,i){
      if(l.ch===' ') return;
      setTimeout(function(){
        var el = document.getElementById('L'+i);
        if(el){ el.classList.add('pop'); if(navigator.vibrate) navigator.vibrate(5); }
      }, startMs + idx*75);
      idx++;
    });

    // Transition to name screen
    var endMs = startMs + idx*75 + 1000;
    setTimeout(function(){
      document.getElementById('sw').classList.add('out');
      setTimeout(function(){
        document.getElementById('sw').style.display = 'none';
        document.getElementById('sn').classList.add('visible');
        setTimeout(function(){ document.getElementById('ni').focus(); }, 500);
      }, 500);
    }, endMs);
  }

  function onT(v){
    var btn = document.getElementById('nb');
    if(v.trim().length>0) btn.classList.add('show');
    else btn.classList.remove('show');
  }

  function doName(){
    var name = document.getElementById('ni').value.trim();
    if (name) localStorage.setItem('cos_name', name);
    localStorage.setItem('cos_welcomed','1');
    // Clear previous niche/platform so they go through setup fresh
    if (!localStorage.getItem('cos_niches')) {
      window.location.href = 'niche.html';
    } else {
      window.location.href = 'dashboard.html';
    }
  }

  function showDash(name){
    window.location.href = 'niche.html';
  }
</script>
</body>
</html>
